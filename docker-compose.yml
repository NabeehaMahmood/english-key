services:
  app:
    build: .
    ports:
      - "8080:80"
    environment:
      MYSQLHOST: db
      MYSQLPORT: "3306"
      MYSQLDATABASE: academy
      MYSQLUSER: root
      MYSQLPASSWORD: rootpass
      APP_DEBUG: "true"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 10
